name: Release Chart

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Prepare Helm signing keyring
        env:
          PASSPHRASE: ${{ secrets.PASSPHRASE }}
        run: |
          umask 077
          # Helm signs using the legacy GPG keyring format.
          gpg --batch --pinentry-mode loopback --passphrase "$PASSPHRASE" \
            --export-secret-keys > "$HOME/.gnupg/secring.gpg"
          printf '%s' "$PASSPHRASE" > "$HOME/.gnupg/passphrase"

      - name: Package Helm chart
        env:
          # `helm package --sign --key` substring-matches User IDs only
          # (fingerprint/keyid lookups fail), so pass the full UID.
          KEY_UID: ${{ steps.import_gpg.outputs.userid }}
        run: |
          mkdir -p .cr-release-packages
          helm package --sign \
            --key "$KEY_UID" \
            --keyring "$HOME/.gnupg/secring.gpg" \
            --passphrase-file "$HOME/.gnupg/passphrase" \
            charts/mercure -d .cr-release-packages

      - name: Upload Helm chart to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" .cr-release-packages/* --clobber

      - name: Update Helm chart repo index
        uses: helm/chart-releaser-action@v1.7.0
        with:
          skip_packaging: true
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_RELEASE_NAME_TEMPLATE: "v{{ .Version }}"
