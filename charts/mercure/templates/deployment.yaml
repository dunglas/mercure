apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mercure.fullname" . }}
  labels:
    {{- include "mercure.labels" . | nindent 4 }}
  {{- with .Values.deployment.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- else if .Release.IsInstall }}
  # Seed the Deployment at minReplicas on fresh install so the HPA
  # doesn't have to scale up from Kubernetes' default of 1. On
  # subsequent upgrades, the field is omitted so the HPA keeps full
  # ownership of the replica count.
  replicas: {{ .Values.autoscaling.minReplicas }}
  {{- end }}
  strategy:
    type: {{ .Values.updateStrategy.type }}
    {{- if eq .Values.updateStrategy.type "RollingUpdate" }}
    # Rotate one pod at a time without dropping capacity. Each pod
    # termination closes its in-flight SSE subscribers; keeping the pace
    # slow lets the ingress and the transport absorb each batch of
    # reconnects separately instead of as a single storm.
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    {{- end }}
  {{- if eq .Values.updateStrategy.type "RollingUpdate" }}
  # Delay marking a newly-Ready pod as Available by 30s, which paces the
  # rolling update (combined with maxSurge=1, maxUnavailable=0 the next
  # pod only rotates out after the current one has been Available for
  # this long). Gives the transport backend loops (BoltDB warm-up, or
  # the Enterprise transport loops) time to reach steady state before
  # the Deployment hands more of the rollout to them.
  minReadySeconds: 30
  # Raise the default k8s progress deadline (600s) so `helm upgrade --wait`
  # doesn't flag ProgressDeadlineExceeded while a pod is draining SSE
  # connections within its terminationGracePeriodSeconds window.
  progressDeadlineSeconds: {{ .Values.progressDeadlineSeconds }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "mercure.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "mercure.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if eq .Values.updateStrategy.type "RollingUpdate" }}
      # Driven by .Values.terminationGracePeriodSeconds so the hub can
      # gracefully drain SSE subscribers at their own writeTimeout pace
      # before k8s SIGKILLs the pod. Only set when RollingUpdate is in
      # effect; with Recreate (used e.g. for BoltDB+persistence single-pod
      # deployments) a long grace period would extend the downtime window
      # because the replacement Pod isn't created until the old one fully
      # terminates.
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mercure.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          {{- if .Values.dev }}
          command: ["caddy"]
          args: ["run", "--config", "/etc/caddy/dev.Caddyfile", "--adapter", "caddyfile"]
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SERVER_NAME
              value: :{{ .Values.service.targetPort }}
            - name: GLOBAL_OPTIONS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "mercure.fullname" . }}
                  key: global-options
            - name: CADDY_EXTRA_CONFIG
              valueFrom:
                secretKeyRef:
                  name: {{ include "mercure.secretName" . }}
                  key: caddy-extra-config
            - name: CADDY_SERVER_EXTRA_DIRECTIVES
              valueFrom:
                secretKeyRef:
                  name: {{ include "mercure.secretName" . }}
                  key: caddy-extra-directives
            {{- if .Values.transportUrl }}
            - name: MERCURE_TRANSPORT_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mercure.secretName" . }}
                  key: transport-url
            {{- end }}
            - name: MERCURE_PUBLISHER_JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mercure.secretName" . }}
                  key: publisher-jwt-key
            - name: MERCURE_PUBLISHER_JWT_ALG
              valueFrom:
                configMapKeyRef:
                  name: {{ include "mercure.fullname" . }}
                  key: publisher-jwt-alg
            - name: MERCURE_SUBSCRIBER_JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mercure.secretName" . }}
                  key: subscriber-jwt-key
            - name: MERCURE_SUBSCRIBER_JWT_ALG
              valueFrom:
                configMapKeyRef:
                  name: {{ include "mercure.fullname" . }}
                  key: subscriber-jwt-alg
            - name: MERCURE_EXTRA_DIRECTIVES
              valueFrom:
                secretKeyRef:
                  name: {{ include "mercure.secretName" . }}
                  key: extra-directives
            - name: MERCURE_LICENSE
              valueFrom:
                secretKeyRef:
                  name: {{ include "mercure.secretName" . }}
                  key: license
          {{- if .Values.extraEnvs }}
            {{- toYaml .Values.extraEnvs | nindent 12 }}
          {{- end }}
          # /config and /tmp are mounted unconditionally so the chart works
          # under `readOnlyRootFilesystem: true` even without persistence.
          # Caddy writes its autosave config under XDG_CONFIG_HOME=/config.
          # /data is only mounted when persistence is enabled; under
          # `readOnlyRootFilesystem: true` with the default BoltDB transport,
          # enable persistence so /data is a writable PVC.
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - mountPath: /data
              name: mercure-data
            {{- end }}
            - mountPath: /config
              name: mercure-config
            - mountPath: /tmp
              name: mercure-tmp
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
            - name: admin
              containerPort: {{ .Values.adminPort | default .Values.metrics.port }}
              protocol: TCP
          {{- if .Values.healthCheck.enabled }}
          # Probes run inside the container via wget (curl isn't in caddy:2-alpine).
          # 127.0.0.1 (not localhost) because BusyBox wget prefers ::1, which Caddy's
          # IPv4-only admin listener refuses.
          readinessProbe:
            exec:
              command: ["wget", "-q", "--spider", "http://127.0.0.1:{{ .Values.adminPort | default .Values.metrics.port }}/mercure/health/ready"]
            initialDelaySeconds: {{ .Values.healthCheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.readiness.failureThreshold }}
          livenessProbe:
            exec:
              command: ["wget", "-q", "--spider", "http://127.0.0.1:{{ .Values.adminPort | default .Values.metrics.port }}/mercure/health/live"]
            initialDelaySeconds: {{ .Values.healthCheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.liveness.failureThreshold }}
          {{- else }}
          # Deprecated: use healthCheck.enabled=true for transport-aware health checks
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          lifecycle:
            preStop:
              exec:
                # wget is used because curl is not shipped in the caddy:2-alpine base image.
                command: ["wget", "-q", "-O", "-", "--post-data=", "http://127.0.0.1:{{ .Values.adminPort | default .Values.metrics.port }}/stop"]
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- tpl . $ | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: mercure-data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (include "mercure.fullname" .) }}
        {{- end }}
        - name: mercure-config
          emptyDir: {}
        - name: mercure-tmp
          emptyDir: {}
